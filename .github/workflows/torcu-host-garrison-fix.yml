name: TORCU Temporary Host Garrison Fix Build

on:
  pull_request:
    branches: [master]

jobs:
  torcu-host-garrison:
    if: startsWith(github.head_ref, 'torcu-temp-host-garrison-1721')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build host garrison compatibility fix
        shell: bash
        run: |
          set -euo pipefail
          dotnet restore torcu-host-garrison-1721/TORCareerUniques.CompatibilityFixes.csproj
          dotnet build torcu-host-garrison-1721/TORCareerUniques.CompatibilityFixes.csproj -c Release --no-restore
          test -f torcu-host-garrison-1721/bin/Release/netstandard2.0/TORCareerUniques.CompatibilityFixes.dll
          test -f torcu-host-garrison-1721/bin/Release/netstandard2.0/TORCareerUniques.CompatibilityFixes.pdb
          sha256sum torcu-host-garrison-1721/bin/Release/netstandard2.0/TORCareerUniques.CompatibilityFixes.dll
      - name: Upload exact build output and source
        uses: actions/upload-artifact@v4
        with:
          name: TORCareerUniques-CompatibilityFixes-v1.7.21
          path: |
            torcu-host-garrison-1721/bin/Release/netstandard2.0/TORCareerUniques.CompatibilityFixes.dll
            torcu-host-garrison-1721/bin/Release/netstandard2.0/TORCareerUniques.CompatibilityFixes.pdb
            torcu-host-garrison-1721/TORCareerUniques.CompatibilityFixes.cs
            torcu-host-garrison-1721/TORCareerUniques.CompatibilityFixes.csproj
          if-no-files-found: error
          retention-days: 1
