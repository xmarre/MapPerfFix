name: Temporary Player Settlement compatibility build

on:
  pull_request:
    branches: [master]
    paths:
      - '_player_settlement_build/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Compile Player Settlement against Bannerlord 1.3.15
        shell: pwsh
        run: |
          $script = Join-Path $env:RUNNER_TEMP 'player-settlement-build.ps1'
          Invoke-WebRequest 'https://raw.githubusercontent.com/xmarre/MapPerfFix/master/.github/scripts/player-settlement-build.ps1' -OutFile $script
          & $script

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: player-settlement-build-${{ github.run_number }}
          path: _player_settlement_build/out
          if-no-files-found: error
