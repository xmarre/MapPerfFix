name: Safety invariant

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify-authoritative-ticks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Verify no authoritative campaign callbacks are skipped or deferred
        run: python3 tools/verify_safety.py
