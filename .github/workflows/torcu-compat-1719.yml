name: TORCU Temporary Compatibility Fix Build

on:
  pull_request:
    branches: [master]

jobs:
  torcu-compat:
    if: startsWith(github.head_ref, 'torcu-temp-fix-1719')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build compatibility fixes
        shell: bash
        run: |
          set +e
          dotnet restore torcu-compat-1719/TORCareerUniques.CompatibilityFixes.csproj > /tmp/torcu-build.log 2>&1
          status=$?
          if [ $status -eq 0 ]; then
            dotnet build torcu-compat-1719/TORCareerUniques.CompatibilityFixes.csproj -c Release --no-restore >> /tmp/torcu-build.log 2>&1
            status=$?
          fi
          echo '=== TORCU BUILD RESULT ==='
          tail -n 120 /tmp/torcu-build.log
          exit $status
      - name: Validate output
        shell: bash
        run: |
          set -euo pipefail
          test -f torcu-compat-1719/bin/Release/netstandard2.0/TORCareerUniques.CompatibilityFixes.dll
          test -f torcu-compat-1719/bin/Release/netstandard2.0/TORCareerUniques.CompatibilityFixes.pdb
          sha256sum torcu-compat-1719/bin/Release/netstandard2.0/TORCareerUniques.CompatibilityFixes.dll
      - name: Upload exact build output and source
        uses: actions/upload-artifact@v4
        with:
          name: TORCareerUniques-CompatibilityFixes-v1.7.19
          path: |
            torcu-compat-1719/bin/Release/netstandard2.0/TORCareerUniques.CompatibilityFixes.dll
            torcu-compat-1719/bin/Release/netstandard2.0/TORCareerUniques.CompatibilityFixes.pdb
            torcu-compat-1719/TORCareerUniques.CompatibilityFixes.cs
            torcu-compat-1719/TORCareerUniques.CompatibilityFixes.csproj
          if-no-files-found: error
          retention-days: 1
