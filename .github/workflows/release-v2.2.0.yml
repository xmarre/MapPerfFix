name: Build and release MapPerfProbe 2.2.0

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-latest
    env:
      TAG: v2.2.0
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Apply deterministic 1.3.15 compatibility source update
        id: source-update
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $path = 'MapPerfFix\SubModule.cs'
          $source = Get-Content -Raw -Encoding UTF8 $path
          $old = 'MapPerfLog.Info("MapPerfProbe 2.1.0 loaded. Authoritative campaign callbacks remain synchronous.");'
          $new = 'MapPerfLog.Info("MapPerfProbe " + BootstrapSubModule.VersionText + " loaded for Bannerlord 1.3.15 / TOR WiTM 1.16. Authoritative campaign callbacks remain synchronous.");'

          if ($source.Contains($old)) {
              $source = $source.Replace($old, $new)
              Set-Content -Encoding UTF8 -NoNewline $path $source
          }
          elseif (-not $source.Contains($new)) {
              throw 'Expected MapPerfProbe startup identity line was not found'
          }

          git diff --check
          if (-not (git diff --quiet)) {
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add -- $path
              git commit -m "fix: target Bannerlord 1.3.15 and TOR 1.16"
              if ('${{ github.event_name }}' -eq 'pull_request') {
                  git push origin "HEAD:${{ github.head_ref }}"
              }
          }

          "target_sha=$(git rev-parse HEAD)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - uses: microsoft/setup-msbuild@v2

      - name: Create compile-time TaleWorlds 1.3.15 API references
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bin = Join-Path $env:GITHUB_WORKSPACE 'game\bin\Win64_Shipping_Client'
          $src = Join-Path $env:RUNNER_TEMP 'mapperf-stubs'
          New-Item -ItemType Directory -Force -Path $bin, $src | Out-Null

          @'
          namespace TaleWorlds.MountAndBlade
          {
              public abstract class MBSubModuleBase
              {
                  protected virtual void OnSubModuleLoad() { }
                  protected virtual void OnSubModuleUnloaded() { }
                  protected virtual void OnBeforeInitialModuleScreenSetAsRoot() { }
                  protected virtual void OnApplicationTick(float dt) { }
              }
          }
          '@ | Set-Content -Encoding UTF8 (Join-Path $src 'MountAndBlade.cs')

          @'
          namespace TaleWorlds.CampaignSystem
          {
              public enum CampaignTimeControlMode
              {
                  Stop = 0,
                  UnstoppablePlay = 1,
                  UnstoppableFastForward = 2,
                  StoppablePlay = 3,
                  StoppableFastForward = 4,
                  UnstoppableFastForwardForPartyWaitTime = 5,
                  FastForwardStop = 6
              }

              public class Campaign
              {
                  public static Campaign Current { get; }
                  public CampaignTimeControlMode TimeControlMode { get; }
              }
          }
          '@ | Set-Content -Encoding UTF8 (Join-Path $src 'CampaignSystem.cs')

          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $vs = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if (-not $vs) { throw 'Visual Studio installation not found' }
          $csc = Join-Path $vs 'MSBuild\Current\Bin\Roslyn\csc.exe'
          if (-not (Test-Path $csc)) { throw "csc.exe not found at $csc" }

          & $csc /nologo /target:library /out:"$bin\TaleWorlds.MountAndBlade.dll" (Join-Path $src 'MountAndBlade.cs')
          if ($LASTEXITCODE -ne 0) { throw 'MountAndBlade reference compilation failed' }
          & $csc /nologo /target:library /out:"$bin\TaleWorlds.CampaignSystem.dll" (Join-Path $src 'CampaignSystem.cs')
          if ($LASTEXITCODE -ne 0) { throw 'CampaignSystem reference compilation failed' }

          foreach ($name in @('TaleWorlds.Core','TaleWorlds.InputSystem','TaleWorlds.Library','TaleWorlds.Engine','TaleWorlds.Localization','TaleWorlds.ObjectSystem')) {
              $empty = Join-Path $src (($name -replace '\.', '_') + '.cs')
              'internal static class ReferenceAssemblyMarker { }' | Set-Content -Encoding UTF8 $empty
              & $csc /nologo /target:library /out:"$bin\$name.dll" $empty
              if ($LASTEXITCODE -ne 0) { throw "$name reference compilation failed" }
          }

      - name: Restore and compile release
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          msbuild MapPerfFix.sln /restore /m /p:Configuration=Release /p:Platform=x64 /p:BannerlordDir="$env:GITHUB_WORKSPACE\game"
          if ($LASTEXITCODE -ne 0) { throw 'MapPerfProbe release build failed' }

      - name: Verify source and compiled identity
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          python tools/sync_version.py --check
          python tools/verify_safety.py

          $dll = Join-Path $env:GITHUB_WORKSPACE 'MapPerfFix\bin\x64\Release\MapPerfProbe.dll'
          if (-not (Test-Path $dll)) { throw "Expected output missing: $dll" }
          $identity = [Reflection.AssemblyName]::GetAssemblyName($dll)
          if ($identity.Name -ne 'MapPerfProbe') { throw "Unexpected assembly name: $($identity.Name)" }
          if ($identity.Version.ToString() -ne '2.2.0.0') { throw "Unexpected assembly version: $($identity.Version)" }

          $xml = [xml](Get-Content -Raw 'MapPerfFix\SubModule.xml')
          if ($xml.Module.Version.value -ne 'v2.2.0') { throw 'SubModule.xml version mismatch' }
          foreach ($submodule in $xml.Module.SubModules.SubModule) {
              if ($submodule.DLLName.value -ne 'MapPerfProbe.dll') { throw 'SubModule.xml DLL identity mismatch' }
          }

      - name: Package module
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $stage = Join-Path $env:RUNNER_TEMP 'MapPerfProbe-v2.2.0'
          $module = Join-Path $stage 'MapPerfProbe'
          $moduleBin = Join-Path $module 'bin\Win64_Shipping_Client'
          New-Item -ItemType Directory -Force -Path $moduleBin | Out-Null
          Copy-Item 'MapPerfFix\SubModule.xml' $module
          Copy-Item 'MapPerfFix\bin\x64\Release\MapPerfProbe.dll' $moduleBin
          $pdb = 'MapPerfFix\bin\x64\Release\MapPerfProbe.pdb'
          if (Test-Path $pdb) { Copy-Item $pdb $moduleBin }
          Copy-Item 'README.md' $module
          Compress-Archive -Path (Join-Path $stage 'MapPerfProbe') -DestinationPath (Join-Path $env:GITHUB_WORKSPACE 'MapPerfProbe-v2.2.0-Bannerlord-1.3.15-TOR-1.16.zip') -Force

      - uses: actions/upload-artifact@v4
        with:
          name: MapPerfProbe-v2.2.0-Bannerlord-1.3.15-TOR-1.16
          path: MapPerfProbe-v2.2.0-Bannerlord-1.3.15-TOR-1.16.zip
          if-no-files-found: error

      - name: Create tag and GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ steps.source-update.outputs.target_sha }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            existing="$(git rev-list -n 1 "${TAG}")"
            if [[ "${existing}" != "${TARGET_SHA}" ]]; then
              echo "${TAG} already points to ${existing}, expected ${TARGET_SHA}" >&2
              exit 1
            fi
          else
            git tag -a "${TAG}" "${TARGET_SHA}" -m "MapPerfProbe 2.2.0 for Bannerlord 1.3.15 and TOR WiTM 1.16"
            git push origin "refs/tags/${TAG}"
          fi

          asset='MapPerfProbe-v2.2.0-Bannerlord-1.3.15-TOR-1.16.zip'
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${asset}" --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${TAG}" "${asset}" \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --title "MapPerfProbe 2.2.0 — Bannerlord 1.3.15 / TOR WiTM 1.16" \
              --notes $'Compatibility release for Mount & Blade II: Bannerlord 1.3.15 and The Old Realms: War in the Mountains 1.16.\n\nValidated changes:\n- retained the established `MapPerfProbe.dll` loader identity;\n- synchronized module and assembly version `2.2.0`;\n- verified the Bannerlord 1.3.15 submodule, campaign-time, and status-message API contracts used by the code;\n- verified 26 eligible TOR 1.16 campaign methods for timing-only profiling;\n- removed stale 1.2.x settings text and stale 2.1.0 startup identity;\n- preserved synchronous authoritative campaign callbacks and fail-open visual compatibility behavior.\n\nBoth version synchronization and safety-invariant checks pass. The attached ZIP is ready to place in the Bannerlord `Modules` directory.'
          fi
