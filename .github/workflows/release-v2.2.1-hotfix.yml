name: Publish MapPerfProbe 2.2.1 loader hotfix

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-hotfix:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-latest
    env:
      TAG: v2.2.1
      BROKEN_TAG: v2.2.0
      BROKEN_ASSET: MapPerfProbe-v2.2.0-Bannerlord-1.3.15-TOR-1.16.zip
      HOTFIX_ASSET: MapPerfProbe-v2.2.1-Bannerlord-1.3.15-TOR-1.16.zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Enforce loader regression checks and retire one-shot workflows
        id: source-update
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('tools/verify_safety.py')
          source = path.read_text(encoding='utf-8')

          old_required = 'for required in ("Native", "SandBoxCore", "Sandbox", "Bannerlord.Harmony", "MCMv5"):'
          new_required = 'for required in ("Native", "SandBoxCore", "Sandbox", "Bannerlord.Harmony", "Bannerlord.MBOptionScreen"):'
          if old_required in source:
              source = source.replace(old_required, new_required, 1)
          elif new_required not in source:
              raise SystemExit('required dependency verifier block was not found')

          anchor = '''    if "StoryMode" in dependencies:\n        fail("StoryMode must not be a hard dependency for TOR sandbox campaigns")\n'''
          addition = '''    if "StoryMode" in dependencies:\n        fail("StoryMode must not be a hard dependency for TOR sandbox campaigns")\n    if "MCMv5" in dependencies:\n        fail("obsolete MCM module ID is forbidden; use Bannerlord.MBOptionScreen")\n\n    for dependency in module.findall("./DependedModules/DependedModule"):\n        dependent_version = dependency.attrib.get("DependentVersion")\n        if dependent_version and re.fullmatch(\n            r"v(?:0|[1-9][0-9]*)\\.(?:0|[1-9][0-9]*)\\.(?:0|[1-9][0-9]*)(?:\\.(?:0|[1-9][0-9]*))?",\n            dependent_version,\n        ) is None:\n            fail(\n                "dependency version must be a complete dotted version: " +\n                dependency.attrib.get("Id", "<missing>") + "=" + dependent_version\n            )\n'''
          if addition not in source:
              if anchor not in source:
                  raise SystemExit('StoryMode verifier anchor was not found')
              source = source.replace(anchor, addition, 1)

          path.write_text(source, encoding='utf-8')
          PY

          rm -f .github/workflows/release-v2.2.0.yml
          rm -f .github/workflows/release-v2.2.1-hotfix.yml

          git diff --check
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "test: reject invalid launcher dependencies"
            if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
              git push origin "HEAD:refs/heads/${GITHUB_HEAD_REF}"
            fi
          fi
          echo "target_sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Verify source invariants
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          python tools/sync_version.py --check
          python tools/verify_safety.py

          $xml = [xml](Get-Content -Raw 'MapPerfFix\SubModule.xml')
          $dependencies = @($xml.Module.DependedModules.DependedModule)
          $ids = @($dependencies | ForEach-Object { $_.Id })
          if ($ids -notcontains 'Bannerlord.MBOptionScreen') { throw 'Correct MCM module dependency is missing' }
          if ($ids -contains 'MCMv5') { throw 'Obsolete MCMv5 dependency is still present' }
          foreach ($dependency in $dependencies) {
            if ($dependency.DependentVersion -eq 'v5') { throw 'Malformed abbreviated dependency version is still present' }
          }

      - name: Download quarantined 2.2.0 binary input
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path input | Out-Null
          gh release download $env:BROKEN_TAG --repo $env:GITHUB_REPOSITORY --pattern $env:BROKEN_ASSET --dir input
          Expand-Archive -LiteralPath (Join-Path 'input' $env:BROKEN_ASSET) -DestinationPath 'input\module' -Force
          $dll = 'input\module\MapPerfProbe\bin\Win64_Shipping_Client\MapPerfProbe.dll'
          if (-not (Test-Path $dll)) { throw "2.2.0 input DLL was not found at $dll" }

      - name: Patch only release assembly metadata
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $project = Join-Path $env:RUNNER_TEMP 'MapPerfMetadataPatch'
          New-Item -ItemType Directory -Force -Path $project | Out-Null

          @'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net8.0</TargetFramework>
              <ImplicitUsings>enable</ImplicitUsings>
              <Nullable>enable</Nullable>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="Mono.Cecil" Version="0.11.5" />
            </ItemGroup>
          </Project>
          '@ | Set-Content -Encoding UTF8 (Join-Path $project 'MapPerfMetadataPatch.csproj')

          @'
          using Mono.Cecil;

          if (args.Length != 2)
              throw new ArgumentException("expected input and output DLL paths");

          var input = Path.GetFullPath(args[0]);
          var output = Path.GetFullPath(args[1]);
          using var assembly = AssemblyDefinition.ReadAssembly(input, new ReaderParameters { InMemory = true });

          if (assembly.Name.Name != "MapPerfProbe" || assembly.Name.Version != new Version(2, 2, 0, 0))
              throw new InvalidOperationException("unexpected 2.2.0 input assembly identity: " + assembly.Name.FullName);

          var gameReferences = assembly.MainModule.AssemblyReferences
              .Where(reference => reference.Name is "TaleWorlds.MountAndBlade" or "TaleWorlds.CampaignSystem")
              .ToArray();
          if (gameReferences.Length != 2 || gameReferences.Any(reference => reference.Version != new Version(0, 0, 0, 0)))
              throw new InvalidOperationException("unexpected synthetic TaleWorlds input references");

          assembly.Name.Version = new Version(2, 2, 1, 0);
          foreach (var reference in gameReferences)
              reference.Version = new Version(1, 0, 0, 0);

          var fileVersion = assembly.CustomAttributes.Single(attribute =>
              attribute.AttributeType.FullName == "System.Reflection.AssemblyFileVersionAttribute");
          fileVersion.ConstructorArguments[0] = new CustomAttributeArgument(
              fileVersion.ConstructorArguments[0].Type,
              "2.2.1.0");

          Directory.CreateDirectory(Path.GetDirectoryName(output)!);
          assembly.Write(output);

          using var verified = AssemblyDefinition.ReadAssembly(output);
          if (verified.Name.Name != "MapPerfProbe" || verified.Name.Version != new Version(2, 2, 1, 0))
              throw new InvalidOperationException("hotfix assembly identity verification failed");
          foreach (var name in new[] { "TaleWorlds.MountAndBlade", "TaleWorlds.CampaignSystem" })
          {
              var reference = verified.MainModule.AssemblyReferences.Single(item => item.Name == name);
              if (reference.Version != new Version(1, 0, 0, 0))
                  throw new InvalidOperationException(name + " reference was not corrected");
          }
          '@ | Set-Content -Encoding UTF8 (Join-Path $project 'Program.cs')

          $inputDll = Join-Path $env:GITHUB_WORKSPACE 'input\module\MapPerfProbe\bin\Win64_Shipping_Client\MapPerfProbe.dll'
          $outputDll = Join-Path $env:GITHUB_WORKSPACE 'dist\MapPerfProbe.dll'
          dotnet run --project (Join-Path $project 'MapPerfMetadataPatch.csproj') --configuration Release -- $inputDll $outputDll
          if ($LASTEXITCODE -ne 0) { throw 'metadata patcher failed' }

          $identity = [Reflection.AssemblyName]::GetAssemblyName($outputDll)
          if ($identity.Name -ne 'MapPerfProbe' -or $identity.Version.ToString() -ne '2.2.1.0') {
            throw "unexpected output identity: $($identity.FullName)"
          }
          Get-FileHash -Algorithm SHA256 $outputDll

      - name: Package corrected module
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $stage = Join-Path $env:RUNNER_TEMP 'MapPerfProbe-v2.2.1'
          $module = Join-Path $stage 'MapPerfProbe'
          $bin = Join-Path $module 'bin\Win64_Shipping_Client'
          New-Item -ItemType Directory -Force -Path $bin | Out-Null
          Copy-Item 'MapPerfFix\SubModule.xml' $module
          Copy-Item 'dist\MapPerfProbe.dll' $bin
          Copy-Item 'README.md' $module
          Compress-Archive -Path $module -DestinationPath (Join-Path $env:GITHUB_WORKSPACE $env:HOTFIX_ASSET) -Force

      - uses: actions/upload-artifact@v4
        with:
          name: MapPerfProbe-v2.2.1-Bannerlord-1.3.15-TOR-1.16
          path: MapPerfProbe-v2.2.1-Bannerlord-1.3.15-TOR-1.16.zip
          if-no-files-found: error

      - name: Publish hotfix and quarantine 2.2.0
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ steps.source-update.outputs.target_sha }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            existing="$(git rev-list -n 1 "${TAG}")"
            if [[ "${existing}" != "${TARGET_SHA}" ]]; then
              echo "${TAG} points to ${existing}, expected ${TARGET_SHA}" >&2
              exit 1
            fi
          else
            git tag -a "${TAG}" "${TARGET_SHA}" -m "MapPerfProbe 2.2.1 emergency loader hotfix"
            git push origin "refs/tags/${TAG}"
          fi

          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${HOTFIX_ASSET}" --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${TAG}" "${HOTFIX_ASSET}" \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --title "MapPerfProbe 2.2.1 — emergency launcher/crash hotfix" \
              --notes $'Emergency replacement for broken version 2.2.0.\n\nDelete the entire existing `Modules\\MapPerfProbe` folder before installing this release. Leaving 2.2.0 unchecked is not safe because Bannerlord scans its descriptor during startup.\n\nFixes:\n- uses the real MCM module ID `Bannerlord.MBOptionScreen`;\n- removes malformed `DependentVersion="v5"`;\n- corrects TaleWorlds assembly references from synthetic `0.0.0.0` to `1.0.0.0`;\n- packages no stale PDB.\n\nStatic loader, source-invariant, and binary-identity checks passed. An in-game launch test is still required.'
          fi

          gh release delete-asset "${BROKEN_TAG}" "${BROKEN_ASSET}" --yes --repo "${GITHUB_REPOSITORY}" || true
          gh release edit "${BROKEN_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --prerelease \
            --title "BROKEN — MapPerfProbe 2.2.0 — do not install" \
            --notes $'This release is withdrawn. Its module descriptor contains an invalid MCM dependency and can crash Bannerlord during module discovery even when unchecked.\n\nDelete `Modules\\MapPerfProbe` completely and install v2.2.1 or later.'
