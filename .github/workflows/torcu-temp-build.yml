name: TORCU Temporary Build

on:
  pull_request:
    branches: [master]

jobs:
  torcu-build:
    if: startsWith(github.head_ref, 'torcu-temp-build-')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Reconstruct prepared TORCU input
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf /tmp/torcu /tmp/torcu-input
          mkdir -p /tmp/torcu/prepared
          git clone --depth 1 --branch torcu-build-temp-1717 https://github.com/xmarre/xmarre.github.io.git /tmp/torcu-input
          ls -lh /tmp/torcu-input/torcu-build/chunks
          cat /tmp/torcu-input/torcu-build/chunks/chunk_*.b64 | tr -d '\r\n' | base64 --decode > /tmp/torcu/prepared.tar.xz
          ls -lh /tmp/torcu/prepared.tar.xz
          xz -t /tmp/torcu/prepared.tar.xz
          tar -xJf /tmp/torcu/prepared.tar.xz -C /tmp/torcu/prepared
          echo '=== PREPARED TREE ==='
          find /tmp/torcu/prepared -maxdepth 5 -type f -printf '%p\n' | sort
          echo '=== BUILD CANDIDATES ==='
          find /tmp/torcu/prepared -type f \( -name '*.sln' -o -name '*.csproj' -o -name '*.sh' -o -name '*.ps1' -o -name '*.md' \) -print | sort
      - name: Upload reconstructed input
        uses: actions/upload-artifact@v4
        with:
          name: torcu-prepared-input
          path: /tmp/torcu/prepared
          if-no-files-found: error
          retention-days: 1
