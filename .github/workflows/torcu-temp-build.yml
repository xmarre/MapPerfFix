name: TORCU Temporary Build

on:
  pull_request:
    branches: [master]

jobs:
  torcu-build:
    if: startsWith(github.head_ref, 'torcu-temp-build-')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build tavern rumor helper
        shell: bash
        run: |
          set -euo pipefail
          dotnet --info
          dotnet restore torcu-helper/TORCareerUniques.TavernRumors.csproj
          dotnet build torcu-helper/TORCareerUniques.TavernRumors.csproj -c Release --no-restore
          test -f torcu-helper/bin/Release/netstandard2.0/TORCareerUniques.TavernRumors.dll
          sha256sum torcu-helper/bin/Release/netstandard2.0/TORCareerUniques.TavernRumors.dll
      - name: Upload helper DLL
        uses: actions/upload-artifact@v4
        with:
          name: TORCareerUniques-TavernRumors-v1.7.17
          path: |
            torcu-helper/bin/Release/netstandard2.0/TORCareerUniques.TavernRumors.dll
            torcu-helper/bin/Release/netstandard2.0/TORCareerUniques.TavernRumors.pdb
          if-no-files-found: error
          retention-days: 1
