name: Temporary assembly inspector build

on:
  pull_request:
    branches: [master]
    paths:
      - '_temp_assembly_inspector/**'
      - '.github/workflows/temp-assembly-inspector.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Publish self-contained inspector
        run: dotnet publish _temp_assembly_inspector/AssemblyInspector.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o _temp_assembly_inspector/out
      - name: Upload inspector
        uses: actions/upload-artifact@v4
        with:
          name: assembly-inspector-linux-x64
          path: _temp_assembly_inspector/out
          if-no-files-found: error
