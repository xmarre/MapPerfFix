name: Temporary assembly inspector build

on:
  pull_request:
    branches: [master]
    paths:
      - '_temp_assembly_inspector/**'
      - '.github/workflows/temp-assembly-inspector.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Publish self-contained inspector
        shell: bash
        run: |
          set +e
          dotnet publish _temp_assembly_inspector/AssemblyInspector.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o _temp_assembly_inspector/out > _temp_assembly_inspector/build.log 2>&1
          status=$?
          cat _temp_assembly_inspector/build.log
          exit $status
      - name: Collect exact upstream source
        shell: bash
        run: |
          git clone https://github.com/BOTLANNER/BannerlordPlayerSettlement.git _temp_assembly_inspector/upstream
          git -C _temp_assembly_inspector/upstream checkout 52d86c7480778afb83e476ac742895f73fbf6d7f
          rm -rf _temp_assembly_inspector/upstream/.git
      - name: Upload inspector, source, and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assembly-inspector-linux-x64
          path: |
            _temp_assembly_inspector/out
            _temp_assembly_inspector/build.log
            _temp_assembly_inspector/upstream
          if-no-files-found: error
