name: TORCU Temporary Host Patrol Radius Build

on:
  pull_request:
    branches: [master]

jobs:
  torcu-host-patrol:
    if: startsWith(github.head_ref, 'torcu-temp-host-patrol-1722')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build compatibility fixes
        shell: bash
        run: |
          set -euo pipefail
          dotnet restore torcu-host-patrol-1722/TORCareerUniques.CompatibilityFixes.csproj
          dotnet build torcu-host-patrol-1722/TORCareerUniques.CompatibilityFixes.csproj -c Release --no-restore
          test -f torcu-host-patrol-1722/bin/Release/netstandard2.0/TORCareerUniques.CompatibilityFixes.dll
          sha256sum torcu-host-patrol-1722/bin/Release/netstandard2.0/TORCareerUniques.CompatibilityFixes.dll
      - name: Upload exact build output and source
        uses: actions/upload-artifact@v4
        with:
          name: TORCareerUniques-CompatibilityFixes-v1.7.22
          path: |
            torcu-host-patrol-1722/bin/Release/netstandard2.0/TORCareerUniques.CompatibilityFixes.dll
            torcu-host-patrol-1722/bin/Release/netstandard2.0/TORCareerUniques.CompatibilityFixes.pdb
            torcu-host-patrol-1722/TORCareerUniques.CompatibilityFixes.cs
            torcu-host-patrol-1722/TORCareerUniques.CompatibilityFixes.csproj
          if-no-files-found: error
          retention-days: 1
